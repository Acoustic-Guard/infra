services:
  # 1. Message Broker
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: acoustic_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Database with PostGIS
  postgres:
    image: postgis/postgis:15-3.3
    container_name: acoustic_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: acousticguard
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Python gRPC Classifier
  classifier:
    build:
      context: ../classifier
      dockerfile: Dockerfile
    container_name: acoustic_classifier
    restart: unless-stopped
    ports:
      - "50051:50051"
    volumes:
      - ../classifier/models:/app/models
    environment:
      - CLASSIFIER_PORT=50051
      - LOG_LEVEL=INFO
      - EXPLOSION_THRESHOLD_DB=-25.0
      - MODEL_PATH=models/random_forest_v1.joblib
      - YAMNET_EXPLOSION_CONFIDENCE=0.20
      - YAMNET_UAV_CONFIDENCE=0.35
      - YAMNET_SIREN_CONFIDENCE=0.10
      - YAMNET_TRUCK_CONFIDENCE=0.30
      - YAMNET_GENERATOR_CONFIDENCE=0.20

  # 4. Java Spring Boot Hub
  java-hub:
    build:
      context: ../hub            
      dockerfile: Dockerfile     
    container_name: acoustic_java_hub
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/acousticguard
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_GRPC_CLIENT_CHANNELS_PYTHON_CLASSIFIER_ADDRESS=static://classifier:50051
      - SENSOR_HEARTBEAT_TIMEOUT_SECS=60
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      classifier:
        condition: service_started

  # 5. Frontend
  frontend:
    build:
      context: ../web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: acoustic_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      java-hub:
        condition: service_started

  # ==========================================
  # EDGE AGENTS - BACKGROUND NOISE (Scattered)
  # ==========================================
  edge-agent-1:
    build: { context: ../edge-agent }
    container_name: acoustic_edge_agent_1
    environment:
      - RUST_LOG=info
      - AMQP_URI=amqp://guest:guest@rabbitmq:5672/%2f
      - DEVICE_ID=node-001
      - LATITUDE=50.4350 # Near Darnytsia Railway Station
      - LONGITUDE=30.6400
      - AUDIO_SOURCE=FILE
      - AUDIO_FILE_PATH=assets/processed/wind-001.wav
      - ANOMALY_THRESHOLD_DB=-20.0
      - TELEMETRY_INTERVAL_SECS=20
    depends_on: { rabbitmq: { condition: service_healthy } }

