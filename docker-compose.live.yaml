services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: acoustic_rabbitmq_live
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  postgres:
    image: postgis/postgis:15-3.3
    container_name: acoustic_postgres_live
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: acousticguard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  classifier:
    build:
      context: ../classifier
      dockerfile: Dockerfile
    container_name: acoustic_classifier_live
    ports:
      - "50051:50051"
    volumes:
      - ../classifier/models:/app/models
    environment:
      - CLASSIFIER_PORT=50051
      - LOG_LEVEL=INFO
      - EXPLOSION_THRESHOLD_DB=-25.0
      - MODEL_PATH=models/random_forest_v1.joblib
      - YAMNET_EXPLOSION_CONFIDENCE=0.20
      - YAMNET_UAV_CONFIDENCE=0.35
      - YAMNET_SIREN_CONFIDENCE=0.10
      - YAMNET_TRUCK_CONFIDENCE=0.30
      - YAMNET_GENERATOR_CONFIDENCE=0.20

  java-hub:
    build:
      context: ../hub            
      dockerfile: Dockerfile     
    container_name: acoustic_java_hub_live
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/acousticguard
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_GRPC_CLIENT_CHANNELS_PYTHON_CLASSIFIER_ADDRESS=static://classifier:50051
      - SENSOR_HEARTBEAT_TIMEOUT_SECS=60
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      classifier:
        condition: service_started