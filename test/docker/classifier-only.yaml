services:
  classifier:
    build:
      context: ../../../classifier
      dockerfile: Dockerfile
    container_name: acoustic_classifier
    restart: unless-stopped
    ports:
      - "3232:3232"
    volumes:
      - ../../../classifier/models:/app/models
    environment:
      - CLASSIFIER_PORT=3232
      - LOG_LEVEL=INFO
      - MODEL_PATH=models/random_forest_v1.joblib
      - YAMNET_MODEL_PATH=models/yamnet.tflite
      - MODEL_VERSION=hybrid-stateless-v1.0
