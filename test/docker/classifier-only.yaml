services:
  classifier:
    build:
      context: ../../../classifier
      dockerfile: Dockerfile
    container_name: acoustic_classifier
    restart: unless-stopped
    ports:
      - "3232:3232"
    environment:
      - CLASSIFIER_PORT=3232
      - LOG_LEVEL=INFO
      - EXPLOSION_THRESHOLD_DB=-10.0
      - UAV_THRESHOLD_DB=-30.0
      - UAV_FREQ_MULTIPLIER=1.5
      - MODEL_VERSION=heuristic-v1.1