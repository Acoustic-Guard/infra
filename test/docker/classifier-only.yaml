services:
  classifier:
    build:
      context: ../../../classifier
      dockerfile: Dockerfile
    container_name: acoustic_classifier
    restart: unless-stopped
    ports:
      - "3232:3232"
    volumes:
      - ../../../classifier/models:/app/models
    environment:
      - CLASSIFIER_PORT=3232
      - LOG_LEVEL=INFO
      - EXPLOSION_THRESHOLD_DB=-10.0
      - MODEL_PATH=models/random_forest_v1.joblib
      - MODEL_VERSION=rf-v1.0