services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: guard_rabbitmq_dev
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rmq_dev_data:/var/lib/rabbitmq

volumes:
  rmq_dev_data:
